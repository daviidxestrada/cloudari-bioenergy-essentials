<div class="eera-contact-card-widget" role="group" aria-label="Joint Programme Coordinator contact card">
  <style>
    .eera-contact-card-widget {
      --eera-card-green: #bed431;
      --eera-card-blue: #1c5986;
      --eera-card-title: #363636;
      --eera-card-text: #818181;
      --eera-card-border: #e5e5e5;
      box-sizing: border-box !important;
      display: block !important;
      font-family:  "Source Sans Pro", Helvetica, Arial, sans-serif !important;
      margin: 0 !important;
      max-width: 100% !important;
      padding: 40px 0 20px !important;
      width: 100% !important;
    }

    .eera-contact-card-widget *,
    .eera-contact-card-widget *::before,
    .eera-contact-card-widget *::after {
      box-sizing: border-box !important;
      text-shadow: none !important;
    }

    .eera-contact-card-widget__card {
      align-items: center !important;
      background: rgba(255, 255, 255, 0.81) !important;
      border: 1px solid var(--eera-card-border) !important;
      border-radius: 3px !important;
      display: flex !important;
      flex-direction: column !important;
      margin: 0 !important;
      min-height: 0 !important;
      padding: 36px 20px 28px !important;
      position: relative !important;
      text-align: center !important;
      width: 100% !important;
    }

    .eera-contact-card-widget__icon {
      align-items: center !important;
      background: var(--eera-card-green) !important;
      border-radius: 30px !important;
      color: var(--eera-card-blue) !important;
      display: inline-flex !important;
      height: 56px !important;
      justify-content: center !important;
      left: 50% !important;
      margin-left: -27px !important;
      padding: 15px 16px 17px !important;
      position: absolute !important;
      top: -30px !important;
      width: 54px !important;
    }

    .eera-contact-card-widget__icon svg {
      display: block !important;
      height: 100% !important;
      stroke: currentColor !important;
      width: 100% !important;
    }

    .eera-contact-card-widget__title {
      color: var(--eera-card-title) !important;
      font-size: 20px !important;
      font-weight: 400 !important;
      letter-spacing: 0 !important;
      line-height: 30px !important;
      margin: 0 0 10px !important;
    }

    .eera-contact-card-widget__details {
      color: var(--eera-card-text) !important;
      font-family: "Varela", Helvetica, Arial, sans-serif !important;
      font-size: 14px !important;
      font-weight: 400 !important;
      line-height: 1.8 !important;
      margin: 0 0 12px !important;
      overflow-wrap: anywhere !important;
    }

    .eera-contact-card-widget__details strong {
      color: var(--eera-card-title) !important;
      font-weight: 800 !important;
    }

    .eera-contact-card-widget__link {
      color: var(--eera-card-text) !important;
      font-weight: 400 !important;
      text-decoration: none !important;
    }

    .eera-contact-card-widget__link:hover {
      color: #00aeef !important;
    }

  </style>

  <article class="eera-contact-card-widget__card">
    <span class="eera-contact-card-widget__icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" focusable="false">
        <rect width="20" height="16" x="2" y="4" rx="2"></rect>
        <path d="m22 7-8.97 5.7a2 2 0 0 1-2.06 0L2 7"></path>
      </svg>
    </span>
    <h3 class="eera-contact-card-widget__title">Joint Programme Coordinator</h3>
    <p class="eera-contact-card-widget__details"><a class="eera-contact-card-widget__link" href="mailto:mchrist@cres.gr">mchrist@cres.gr</a></p>
  </article>
</div>
